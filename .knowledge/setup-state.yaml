# Setup State — tracks interview progress
# Created by /setup skill, read by knowledge-bootstrap and first-run-welcome
schema_version: 1
setup_complete: false
started_at: null
completed_at: null

phases:
  phase_1_role:
    status: "not_started"  # not_started | in_progress | complete | skipped
    completed_at: null
    data:
      role: null            # e.g., "Product Manager", "Data Scientist", "Engineer"
      team: null            # e.g., "Growth", "Platform", "Analytics"
      experience_level: null # beginner | intermediate | advanced
      communication_style: null  # technical | business | mixed

  phase_2_data:
    status: "not_started"
    completed_at: null
    data:
      source_type: null     # csv | duckdb | warehouse
      source_path: null     # path to CSV dir or DuckDB file
      warehouse_type: null  # postgres | bigquery | snowflake | motherduck (if warehouse)
      active_dataset: null  # dataset ID once connected
      tables_count: null    # number of tables detected

  phase_3_business:
    status: "not_started"
    completed_at: null
    data:
      company_name: null
      industry: null
      organization_id: null  # slug used in .knowledge/organizations/{id}/
      products_count: 0
      metrics_count: 0
      objectives_count: 0
      glossary_terms_count: 0

  phase_4_preferences:
    status: "not_started"
    completed_at: null
    data:
      preferred_output: null    # slides | narrative | data | email
      chart_style: null         # swd | minimal | branded
      export_channels: []       # slack | email | notion | gdrive
      detail_level: null        # executive | detailed | technical
      theme: null               # default | custom theme name

  # Phase 5 is opt-in and standalone — invoked via /setup-dev-context
  development_context:
    status: "not_started"
    completed_at: null
    data:
      codebase_path: null
      framework: null
      tracking_system: null
